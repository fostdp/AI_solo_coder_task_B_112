# 海昏侯简牍监测系统配置文件

# ClickHouse 数据库配置
clickhouse:
  host: 127.0.0.1
  port: 8123
  database: haihunhou
  user: default
  password: ""
  timeout_ms: 10000
  pool_size: 10

# HTTP 服务器配置
http_server:
  host: 0.0.0.0
  port: 8080
  frontend_dir: "./frontend"
  max_request_size: 10485760

# WebSocket 配置
websocket:
  ping_interval_sec: 30
  max_connections: 100

# OPC UA 客户端配置
opcua:
  enabled: false
  server_url: "opc.tcp://localhost:4840"
  polling_interval_sec: 21600
  timeout_ms: 5000
  simulation_mode: true

# 告警配置
alert:
  # 墨迹反射率月下降率阈值 (0.2 = 20%)
  fading_threshold: 0.2
  # 霉菌浓度阈值 (CFU/cm²)
  mold_threshold: 100.0
  # 告警抑制时间 (秒)
  suppression_window_sec: 86400
  # 告警检查间隔 (秒)
  check_interval_sec: 3600

# 通知配置
notification:
  dingtalk:
    enabled: false
    webhook_url: "https://oapi.dingtalk.com/robot/send?access_token=YOUR_TOKEN"
    secret: "YOUR_SECRET"
  email:
    enabled: false
    smtp_server: "smtp.example.com"
    smtp_port: 465
    use_ssl: true
    username: "your_email@example.com"
    password: "your_password"
    sender_name: "简牍监测系统"
    recipients:
      - "admin@example.com"
      - "conservator@example.com"

# 核心算法参数
algorithm:
  fading_model:
    # 光氧化指前因子
    A1: 1.0e-8
    # 光氧化活化能 (kJ/mol)
    Ea1: 50.0
    # 水解指前因子
    A2: 1.0e-9
    # 水解活化能 (kJ/mol)
    Ea2: 60.0
    # 波长指数
    alpha: 3.0
    # 湿度指数
    beta: 2.0
    # 参考波长 (nm)
    lambda0: 450

  mold_model:
    # 响应面模型系数
    beta0: 1.0
    beta1: 0.08
    beta2: 0.06
    beta3: -0.0015
    beta4: -0.0008
    beta5: 0.001

# 简牍缀合智能推荐配置
cnn_matcher:
  # 模型文件路径 (libtorch .pt 格式)
  model_path: "models/siamese_stroke.pt"
  # 匹配阈值 0-1
  match_threshold: 0.7
  # 最大候选数量
  max_candidates: 10
  # 笔锋特征权重
  stroke_weight: 0.6
  # 轮廓特征权重
  contour_weight: 0.4
  # 嵌入向量维度
  embedding_dim: 128

# 古代墨料成分反演配置
plsr_inversion:
  # 模型系数文件路径 (JSON)
  coefficients_path: "models/plsr_ink_coefficients.json"
  # PLS潜变量数量
  n_components: 15
  # 置信度阈值
  confidence_threshold: 0.85
  # 波长列表 (nm)
  wavelengths: [380, 400, 450, 500, 550, 600, 650, 700, 750, 780]

# 霉菌腐蚀预测配置
rf_corrosion:
  # 随机森林模型文件路径 (JSON)
  model_path: "models/rf_corrosion_model.json"
  # 决策树数量
  n_estimators: 200
  # 最小腐蚀加剧因子
  min_corrosion_factor: 1.0
  # 最大腐蚀加剧因子
  max_corrosion_factor: 10.0
  # 风险等级阈值 (4级:低/中/高/极高)
  risk_thresholds: [1.5, 3.0, 6.0]

# 微环境贝叶斯优化配置
bayes_opt:
  # 最大迭代次数
  max_iterations: 100
  # 初始采样点数
  initial_samples: 5
  # 温度范围 (°C)
  temperature_min: 15.0
  temperature_max: 30.0
  # 湿度范围 (%RH)
  humidity_min: 40.0
  humidity_max: 70.0
  # 紫外过滤率范围 (0-1)
  light_filter_min: 0.0
  light_filter_max: 1.0
  # 高斯过程核长度尺度
  gp_length_scale: 1.0
  # 高斯过程信号方差
  gp_signal_variance: 1.0
  # 高斯过程噪声方差
  gp_noise_variance: 0.01
  # 采集函数: ei/ucb/pi
  acquisition_function: "ei"
  # UCB探索系数
  ucb_kappa: 2.576

# 日志配置
logging:
  level: info
  file: "logs/server.log"
  max_file_size_mb: 100
  max_files: 10
